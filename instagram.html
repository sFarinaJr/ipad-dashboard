<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dashboard - Reels Aleatórios Instagram</title>
<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }
#embedContainer { width:100%; height:100%; position:absolute; top:0; left:0; overflow:hidden; }
#debug { position:fixed; top:0; left:0; right:0; z-index:999; background:#0b5ed7; color:#fff; padding:6px; font-size:13px; font-family:monospace; opacity:0.85; }
.progress-container { position:fixed; bottom:0; left:0; right:0; height:28px; background:#222; z-index:100; }
.progress-bg { position:absolute; inset:0; background:linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c); }
.progress-mask { position:absolute; inset:0 0 0 0; background:#000; width:100%; z-index:1; transition:width 0.3s; }
.scale { position:absolute; inset:0; color:white; font-weight:bold; text-shadow:0 0 4px #000; }
.scale span { float:left; width:20%; text-align:center; line-height:28px; }
@keyframes shrink { from {width:100%} to {width:0%} }
</style>
</head>
<body onclick="skip()">

<div id="debug">Carregando Reels aleatórios...</div>
<div id="embedContainer"></div>

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
    <span>5m</span><span>4m</span><span>3m</span><span>2m</span><span>1m</span>
  </div>
</div>

<script>
// Lista manual de Reels por username (adicione mais URLs reais aqui!)
const reelsPorPerfil = {
  'supercarblondie': [
    'https://www.instagram.com/reel/C_exemplo1/',   // substitua por reais
    'https://www.instagram.com/reel/C_exemplo2/',
    'https://www.instagram.com/reel/C_exemplo3/',
    // pegue 5-15 Reels recentes do perfil @supercarblondie
  ],
  'shmee150': [
    'https://www.instagram.com/reel/D_exemploA/',
    'https://www.instagram.com/reel/D_exemploB/',
    // adicione Reels do @shmee150
  ],
  '20car.company': [
    'https://www.instagram.com/reel/E_exemploX/',
    // adicione do @20car.company
  ]
  // adicione mais perfis se quiser
};

const usernames = Object.keys(reelsPorPerfil);
let currentReel = null;
let autoTimeout = null;

function getRandomReel() {
  const username = usernames[Math.floor(Math.random() * usernames.length)];
  const reels = reelsPorPerfil[username];
  if (!reels || reels.length === 0) return null;
  
  const reelUrl = reels[Math.floor(Math.random() * reels.length)];
  return { username, reelUrl };
}

function resetProgress() {
  const mask = document.getElementById('progressMask');
  mask.style.animation = 'none';
  mask.style.width = '100%';
  void mask.offsetWidth; // reflow
  mask.style.animation = 'shrink 300s linear forwards';
}

function mostrar() {
  resetProgress();
  const item = getRandomReel();
  if (!item) {
    document.getElementById('debug').innerHTML = 'Nenhum Reel disponível';
    return;
  }
  
  const { username, reelUrl } = item;
  const container = document.getElementById('embedContainer');
  
  // Embed single Reel (full-screen)
  const html = `
    <blockquote class="instagram-media" data-instgrm-permalink="${reelUrl}embed" data-instgrm-version="14" style="width:100%; height:100%; background:#000;">
      <section></section>
    </blockquote>
    <div style="position:absolute; bottom:10px; left:0; right:0; text-align:center; color:white; font-size:1.8em; background:rgba(0,0,0,0.6); padding:12px; pointer-events:none;">
      @${username} – Reel aleatório
    </div>
    <div style="position:absolute; top:10px; right:10px; color:white; font-size:1.2em; background:rgba(0,0,0,0.5); padding:6px; border-radius:6px;">
      Próximo em 5 min
    </div>`;
  
  container.innerHTML = html;
  
  document.getElementById('debug').innerHTML = `Reel de @${username} (${usernames.length} perfis disponíveis)`;
  
  // Carrega/reprocessa o script do Instagram
  if (!document.getElementById('igScript')) {
    const s = document.createElement('script');
    s.id = 'igScript';
    s.async = true;
    s.src = '//www.instagram.com/embed.js';
    document.body.appendChild(s);
  } else if (window.instgrm && window.instgrm.Embeds) {
    window.instgrm.Embeds.process();
  }
  
  schedule();
}

function schedule() {
  if (autoTimeout) clearTimeout(autoTimeout);
  autoTimeout = setTimeout(next, 300000); // 5 minutos
}

function next() {
  mostrar();
}

function skip() {
  if (autoTimeout) clearTimeout(autoTimeout);
  next();
}

// Inicia mostrando o primeiro aleatório
mostrar();
</script>
</body>
</html>
