<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard Universal - Estável</title>
<style>
* { margin:0; padding:0; border:0; box-sizing:border-box; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }

/* Imagem em tela cheia */
#mainImage { 
    width:100%; 
    height:100%; 
    object-fit: contain; /* ou 'cover' se preferir cortar bordas */
    display:block; 
    position: absolute;
    top: 0;
    left: 0;
}

#debug { 
    position:fixed; 
    top:0; 
    left:0; 
    right:0; 
    z-index:999; 
    background:rgba(11,94,215,0.8); 
    color:#fff; 
    padding:8px; 
    font-size:13px; 
    font-family:monospace; 
    white-space:nowrap; 
    overflow:hidden; 
    text-overflow:ellipsis; 
}

/* Barra de tempo */
.progress-container { 
    position:fixed; 
    bottom:0; 
    left:0; 
    right:0; 
    height:28px; 
    background:#222; 
    z-index:100; 
}

.progress-bg { 
    position:absolute; 
    inset:0; 
    background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c); 
}

.progress-mask { 
    position:absolute; 
    inset:0 0 0 0; 
    background:#000; 
    width:100%; 
    -webkit-animation: shrink 300s linear forwards; 
    animation: shrink 300s linear forwards; 
    z-index:1; 
}

@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }

.scale { 
    position:absolute; 
    inset:0; 
    z-index:101; 
    color:white; 
    font-size:14px; 
    font-weight:bold; 
    text-shadow:0 0 3px #000; 
}

.scale span { 
    float:left; 
    width:20%; 
    text-align:center; 
    line-height:28px; 
}
</style>
</head>
<body onclick="skip()">

<div id="debug">Iniciando... (iPad mode estável)</div>

<img id="mainImage" src="" alt="Dashboard">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
    <span>5m</span><span>4m</span><span>3m</span><span>2m</span><span>1m</span>
  </div>
</div>

<script>
// Configurações
var repoUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var baseUrlRaiz   = repoUrl;
var manifestRaiz  = repoUrl + 'imagensPNG.txt';
var baseUrlCarros = repoUrl + 'carros/screenshots/';
var manifestCarros = repoUrl + 'carros/imagens_carros.txt';

var tempoTroca = 5 * 60 * 1000;      // 5 minutos
var tempoReloadPagina = 4 * 3600 * 1000; // 4 horas = reset total de memória

var imagens = [];
var idx = 0;
var loadTimeout = null;
var autoTimeout = null;
var startTime = Date.now();

var debug = document.getElementById('debug');
var img = document.getElementById('mainImage');
var progressMask = document.getElementById('progressMask');

var imagensRaiz = [];
var imagensCarros = [];
var loaded = 0;

// Recarrega a página inteira para limpar memória
setTimeout(function() {
    debug.innerHTML = '4h atingidas → recarregando página para limpar memória...';
    setTimeout(function() { location.reload(true); }, 2000);
}, tempoReloadPagina);

function log(msg) {
    var minutos = Math.round((Date.now() - startTime)/60000);
    var total = imagens.length;
    var pos = total > 0 ? ' (' + (idx+1) + '/' + total + ')' : '';
    debug.innerHTML = minutos + 'min | ' + msg + pos;
}

function resetProgress() {
    progressMask.style.animation = 'none';
    progressMask.style.webkitAnimation = 'none';
    progressMask.offsetHeight; // reflow
    progressMask.style.animation = 'shrink 300s linear forwards';
    progressMask.style.webkitAnimation = 'shrink 300s linear forwards';
}

function onImageLoad() {
    clearTimeouts();
    resetProgress();
    log('OK: ' + imagens[idx].name);
    autoTimeout = setTimeout(proxima, tempoTroca);
}

function onImageError() {
    clearTimeouts();
    log('ERRO: ' + imagens[idx].name);
    setTimeout(proxima, 8000); // espera menos que antes
}

function clearTimeouts() {
    if (loadTimeout) clearTimeout(loadTimeout);
    if (autoTimeout) clearTimeout(autoTimeout);
    loadTimeout = autoTimeout = null;
}

function mostrarImagem() {
    if (!imagens.length) return;
    
    // Limpa src primeiro (ajuda memória em Safari antigo)
    img.src = '';
    img.src = imagens[idx].urlBase;

    clearTimeouts();
    loadTimeout = setTimeout(function() {
        log('TIMEOUT: ' + imagens[idx].name);
        proxima();
    }, 20000);
}

function proxima() {
    idx = (idx + 1) % imagens.length;
    mostrarImagem();
}

function skip() {
    clearTimeouts();
    proxima();
}

function buildImagens() {
    var i = 0, j = 0;
    imagens = [];

    while (j < imagensRaiz.length) {
        var qtd = Math.min(3, imagensCarros.length - i);
        for (var k = 0; k < qtd; k++) {
            imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
            i++;
        }
        imagens.push({urlBase: baseUrlRaiz + imagensRaiz[j], name: imagensRaiz[j]});
        j++;
    }

    while (i < imagensCarros.length) {
        imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
        i++;
    }

    if (imagens.length) {
        log('Lista OK: ' + imagens.length + ' imgs');
        mostrarImagem();
    } else {
        log('Lista vazia!');
    }
}

function checkLoaded() {
    loaded++;
    if (loaded === 2) buildImagens();
}

function loadManifest(url, arr, isRaiz) {
    var tipo = isRaiz ? 'raiz' : 'carros';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 15000;
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                var linhas = (xhr.responseText || '').split('\n');
                for (var i = 0; i < linhas.length; i++) {
                    var ln = linhas[i].trim();
                    if (ln && /\.png$/i.test(ln)) arr.push(ln);
                }
                log('Manifest ' + tipo + ': ' + arr.length + ' itens');
                checkLoaded();
            } else {
                log('Erro manifest ' + tipo + ' (' + xhr.status + ') → retry em 10s');
                setTimeout(function(){ loadManifest(url, arr, isRaiz); }, 10000);
            }
        }
    };
    xhr.ontimeout = function() {
        log('Timeout manifest ' + tipo + ' → retry');
        setTimeout(function(){ loadManifest(url, arr, isRaiz); }, 10000);
    };
    xhr.send();
}

loadManifest(manifestRaiz, imagensRaiz, true);
loadManifest(manifestCarros, imagensCarros, false);
</script>
</body>
</html>
