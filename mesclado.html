<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard Universal - Mesclado</title>
<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }
#mainImage { width:100% !important; height:100% !important; display:block; position:absolute; top:0; left:0; }
#debug { position:fixed; top:0; left:0; right:0; z-index:999; background:#0b5ed7; color:#fff; padding:6px 10px; font-size:13px; font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0.85; }
.progress-container { position:fixed; bottom:0; left:0; right:0; height:28px; background:#222; z-index:100; }
.progress-bg { position:absolute; top:0; right:0; bottom:0; left:0; background:-webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c); }
.progress-mask { position:absolute; top:0; bottom:0; left:0; background:#000; width:100%; z-index:1; }
.scale { position:absolute; top:0; left:0; width:100%; height:28px; z-index:101; color:white; font-size:14px; font-weight:bold; text-shadow:0 0 4px #000; }
.scale span { display:block; float:left; width:20%; text-align:center; line-height:28px; }
@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }
</style>
</head>
<body onclick="skip()">

<div id="debug">Inicializando...</div>
<img id="mainImage" src="" alt="Dashboard" onload="onImageLoad()" onerror="onImageError()">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
      <span>5m</span><span>4m</span><span>3m</span><span>2m</span><span>1m</span>
  </div>
</div>

<script>
// =============================================
// Variáveis globais mínimas
// =============================================
var repoUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var imagens = [];
var idx = 0;
var loadTimeout = null;
var autoTimeout = null;
var timeOffset = 0;
var waitingCountdown = null;

var debug = document.getElementById('debug');
var imgElement = document.getElementById('mainImage');
var progressMask = document.getElementById('progressMask');

var baseUrlRaiz   = repoUrl;
var manifestRaiz  = repoUrl + 'imagensPNG.txt';
var baseUrlCarros = repoUrl + 'carros/';
var manifestCarros = repoUrl + 'carros/imagens_carros.txt';

var imagensRaiz = [];
var imagensCarros = [];

// =============================================
// Funções de tempo (hora internet)
// =============================================
function getRealMs() {
  return Date.now() + timeOffset;
}

function syncServerTime(callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('HEAD', manifestRaiz + '?v=' + Date.now(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      var dateHeader = xhr.getResponseHeader('Date');
      if (dateHeader) {
        timeOffset = new Date(dateHeader).getTime() - Date.now();
      }
      callback();
    }
  };
  xhr.send();
}

function getCurrentSlotStartMs() {
  var ms = getRealMs();
  var d = new Date(ms);
  var min = d.getMinutes();
  min = min - (min % 5);
  var slot = new Date(d.getFullYear(), d.getMonth(), d.getDate(), d.getHours(), min, 0, 0);
  return slot.getTime();
}

function getMsUntilNextSlot() {
  var now = getRealMs();
  var current = getCurrentSlotStartMs();
  var next = current + 300000;
  var diff = next - now;
  if (diff <= 0) diff += 300000;
  return diff;
}

// =============================================
// Debug e progresso
// =============================================
function log(msg) {
  var total = imagens.length;
  var pos = total > 0 ? ' (' + (idx+1) + '/' + total + ')' : '';
  debug.innerHTML = msg + pos;
}

function updateWaitingCountdown() {
  if (!waitingCountdown) return;
  var remaining = Math.ceil(waitingCountdown / 1000);
  debug.innerHTML = 'Aguardando próximo múltiplo de 5 min... (' + remaining + 's)';
  waitingCountdown -= 1000;
  if (waitingCountdown > 0) {
    setTimeout(updateWaitingCountdown, 1000);
  }
}

// =============================================
// Funções principais do slideshow
// =============================================
function resetProgress(sec) {
  progressMask.style.webkitAnimation = 'none';
  progressMask.style.animation = 'none';
  progressMask.style.width = '100%';
  progressMask.offsetHeight; // reflow
  progressMask.style.webkitAnimation = 'shrink ' + sec + 's linear forwards';
  progressMask.style.animation = 'shrink ' + sec + 's linear forwards';
}

function onImageLoad() {
  if (loadTimeout) clearTimeout(loadTimeout);
  var end = getCurrentSlotStartMs() + 300000;
  var remain = Math.ceil((end - getRealMs()) / 1000);
  if (remain < 10) remain = 300;
  resetProgress(remain);
  log(imagens[idx].name);
  scheduleNext();
}

function onImageError() {
  if (loadTimeout) clearTimeout(loadTimeout);
  log('ERRO carregando: ' + imagens[idx].name);
  setTimeout(nextImage, 5000);
}

function mostrarImagem() {
  if (imagens.length === 0) return;
  imgElement.src = imagens[idx].urlBase + '?v=' + Date.now();
  loadTimeout = setTimeout(function(){
    log('TIMEOUT: ' + imagens[idx].name);
    nextImage();
  }, 30000);
}

function nextImage() {
  idx = (idx + 1) % imagens.length;
  try { localStorage.setItem('lastIdx', idx); } catch(e){}
  mostrarImagem();
}

function skip() {
  if (autoTimeout) clearTimeout(autoTimeout);
  nextImage();
}

function scheduleNext() {
  if (autoTimeout) clearTimeout(autoTimeout);
  autoTimeout = setTimeout(nextImage, getMsUntilNextSlot());
}

// =============================================
// Construção da lista + lógica de espera
// =============================================
function buildImagens() {
  var i = 0, j = 0;
  imagens = [];

  while (j < imagensRaiz.length) {
    var qtd = Math.min(3, imagensCarros.length - i);
    for (var k = 0; k < qtd; k++) {
      imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
      i++;
    }
    imagens.push({urlBase: baseUrlRaiz + imagensRaiz[j], name: imagensRaiz[j]});
    j++;
  }
  while (i < imagensCarros.length) {
    imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
    i++;
  }

  if (imagens.length === 0) {
    log('Nenhuma imagem encontrada');
    return;
  }

  log('Carregadas ' + imagens.length + ' imagens');

  // Limpa slot antigo na primeira carga
  try {
    localStorage.removeItem('lastSlotStart');
  } catch(e){}

  var savedIdx = null;
  try {
    savedIdx = localStorage.getItem('lastIdx');
  } catch(e){}

  var delay = getMsUntilNextSlot();
  if (delay > 300000 - 10000) {  // Se já está muito perto do próximo, força espera completa
    delay = 300000;
  }

  if (delay > 5000) {
    // Espera visível
    waitingCountdown = delay;
    updateWaitingCountdown();
    setTimeout(function(){
      if (savedIdx !== null) {
        idx = parseInt(savedIdx, 10) % imagens.length;
      } else {
        idx = Math.floor(getRealMs() / 300000) % imagens.length;
      }
      try { localStorage.setItem('lastIdx', idx); } catch(e){}
      mostrarImagem();
    }, delay);
  } else {
    // Já está no slot → usa salvo ou calcula
    if (savedIdx !== null) {
      idx = parseInt(savedIdx, 10) % imagens.length;
    } else {
      idx = Math.floor(getRealMs() / 300000) % imagens.length;
    }
    try { localStorage.setItem('lastIdx', idx); } catch(e){}
    mostrarImagem();
  }
}

function parseManifest(text) {
  var arr = [];
  var lines = text.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var ln = lines[i].trim();
    if (ln && (ln.indexOf('.png') !== -1 || ln.indexOf('.PNG') !== -1)) {
      arr.push(ln);
    }
  }
  return arr;
}

function loadManifestRaiz() {
  log('Baixando lista raiz...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', manifestRaiz + '?v=' + Date.now(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      imagensRaiz = parseManifest(xhr.responseText);
      log('Raiz: ' + imagensRaiz.length + ' itens');
      loadManifestCarros();
    } else if (xhr.readyState === 4) {
      log('Erro raiz: ' + xhr.status);
      setTimeout(loadManifestRaiz, 15000);
    }
  };
  xhr.send();
}

function loadManifestCarros() {
  log('Baixando lista carros...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', manifestCarros + '?v=' + Date.now(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      imagensCarros = parseManifest(xhr.responseText);
      log('Carros: ' + imagensCarros.length + ' itens');
      buildImagens();
    } else if (xhr.readyState === 4) {
      log('Erro carros: ' + xhr.status);
      setTimeout(loadManifestCarros, 15000);
    }
  };
  xhr.send();
}

// =============================================
// Início
// =============================================
syncServerTime(function() {
  loadManifestRaiz();
});
</script>
</body>
</html>
