<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Blindado</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:#000;
    height:100%;
    overflow:hidden;
    font-family: monospace;
}

#img {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

#debug {
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#0b5ed7;
    color:#fff;
    font-size:13px;
    padding:5px;
    z-index:1000;
    opacity:0.85;
    white-space:nowrap;
    overflow:hidden;
}

#barContainer {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:25px;
    background:#222;
}

#bar {
    height:100%;
    width:100%;
    background:#4a90e2;
}
</style>
</head>

<body onclick="proxima()">

<div id="debug">Iniciando...</div>
<img id="img">
<div id="barContainer">
    <div id="bar"></div>
</div>

<script>

// ===================== CONFIG =====================
var repo = "https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/";
var tempoTotal = 300; // 5 minutos
var reloadPreventivo = 90 * 60 * 1000; // 90 minutos
// ==================================================

var listaRaiz = [];
var listaCarros = [];
var imagens = [];

var idx = 0;
var tempoRestante = tempoTotal;
var inicio = new Date().getTime();
var img = document.getElementById("img");
var debug = document.getElementById("debug");
var bar = document.getElementById("bar");
var carregadas = 0;
var erroContador = 0;


// ===================== RELOAD PREVENTIVO =====================
setTimeout(function(){
    debug.innerHTML = "Reload preventivo...";
    location.reload(true);
}, reloadPreventivo);


// ===================== DEBUG =====================
function log(msg) {
    var minutos = Math.floor((new Date().getTime() - inicio)/60000);
    var total = imagens.length;
    var pos = total > 0 ? " (" + (idx+1) + "/" + total + ")" : "";
    debug.innerHTML = minutos + "m | " + msg + pos;
}


// ===================== LOOP PRINCIPAL (ÚNICO TIMER) =====================
setInterval(function(){

    if (imagens.length === 0) return;

    tempoRestante--;

    bar.style.width = (tempoRestante / tempoTotal) * 100 + "%";

    if (tempoRestante <= 0) {
        proxima();
    }

}, 1000);


// ===================== TROCAR IMAGEM =====================
function mostrar() {

    if (imagens.length === 0) return;

    // LIMPEZA REAL DE MEMÓRIA
    img.src = "";
    img.removeAttribute("src");

    setTimeout(function(){
        img.src = imagens[idx];
        log(imagens[idx]);
    }, 100); // pequeno delay protege Safari antigo
}


function proxima() {

    if (imagens.length === 0) return;

    tempoRestante = tempoTotal;

    idx++;
    if (idx >= imagens.length) idx = 0;

    mostrar();
}


// ===================== ERRO DE IMAGEM =====================
img.onerror = function() {
    erroContador++;
    log("Erro imagem. Pulando...");
    setTimeout(proxima, 2000);

    if (erroContador > 10) {
        log("Muitos erros. Reiniciando...");
        location.reload(true);
    }
};


// ===================== MONTAR LISTA 3:1 =====================
function montarLista() {

    var i = 0;
    var j = 0;

    while (j < listaRaiz.length) {

        var k = 0;
        while (k < 3 && i < listaCarros.length) {
            imagens.push(repo + "carros/screenshots/" + listaCarros[i]);
            i++;
            k++;
        }

        imagens.push(repo + listaRaiz[j]);
        j++;
    }

    while (i < listaCarros.length) {
        imagens.push(repo + "carros/screenshots/" + listaCarros[i]);
        i++;
    }

    if (imagens.length > 0) {
        log("Lista pronta: " + imagens.length + " imagens");
        mostrar();
    } else {
        log("Lista vazia");
    }
}


// ===================== CARREGAR MANIFEST =====================
function carregarLista(url, destino, callback) {

    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);

    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {

            if (xhr.status === 200) {

                var linhas = xhr.responseText.split("\n");

                for (var i = 0; i < linhas.length; i++) {
                    var l = linhas[i].replace(/\r/g,"").trim();
                    if (l.indexOf(".png") > -1 || l.indexOf(".PNG") > -1) {
                        destino.push(l);
                    }
                }

                callback();

            } else {
                log("Erro manifest. Tentando novamente...");
                setTimeout(function(){
                    carregarLista(url, destino, callback);
                }, 15000);
            }
        }
    };

    xhr.send();
}


// ===================== START =====================
function check() {
    carregadas++;
    if (carregadas == 2) {
        montarLista();
    }
}

carregarLista(repo + "imagensPNG.txt", listaRaiz, check);
carregarLista(repo + "carros/imagens_carros.txt", listaCarros, check);

</script>

</body>
</html>
