<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard Teste Minimal - Crash na 1ª imagem</title>
<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }

#mainImage { 
    width:100%; 
    height:100%; 
    object-fit: contain; 
    display:block; 
    position: absolute;
    top: 0;
    left: 0;
    background:#111; /* fallback se imagem falhar */
}

#debug { 
    position:fixed; 
    top:0; left:0; right:0; 
    z-index:999; 
    background:#0b5ed7; 
    color:#fff; 
    padding:10px; 
    font-size:16px; 
    font-family:monospace; 
    white-space:pre-wrap; 
    opacity:0.9; 
}
</style>
</head>
<body>

<div id="debug">Teste minimal - Iniciando...</div>
<img id="mainImage" src="" alt="Teste" onload="onLoadOk()" onerror="onError()">

<script>
var debug = document.getElementById('debug');
var img = document.getElementById('mainImage');

function log(msg) {
    debug.innerHTML += '\n' + msg;
}

log('Versão minimal - sem GitHub');

// Substitua esta URL por uma imagem sua comprimida (<500KB idealmente)
// Exemplo: https://i.imgur.com/SUA_IMAGEM_AQUI.jpg
var testeUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/screenshot001.png'; // teste com a primeira real

log('Tentando carregar: ' + testeUrl);

img.src = ''; // limpa
setTimeout(function() {
    img.src = testeUrl;
    log('src setado... aguardando onload/onerror');
}, 500);

function onLoadOk() {
    log('ONLOAD OK! Imagem carregou (largura: ' + img.naturalWidth + 'px)');
    debug.style.background = '#28a745'; // verde = sucesso
}

function onError() {
    log('ERRO ao carregar imagem! (pode ser crash iminente)');
    debug.style.background = '#dc3545'; // vermelho = erro
    setTimeout(function() {
        log('Recarregando página em 5s para teste...');
        location.reload(true);
    }, 5000);
}

// Se nada acontecer em 30s → reload automático
setTimeout(function() {
    if (debug.innerHTML.indexOf('ONLOAD OK') === -1) {
        log('TIMEOUT 30s - nada carregou → recarregando...');
        location.reload(true);
    }
}, 30000);
</script>
</body>
</html>
