<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard Universal - Barra Corrigida</title>
<style>
* { margin:0; padding:0; border:0; box-sizing:border-box; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }

/* Imagem em tela cheia */
#mainImage { 
    width:100%; 
    height:100%; 
    object-fit: contain; /* 'cover' se quiser preencher sem bordas brancas */
    display:block; 
    position: absolute;
    top: 0;
    left: 0;
}

#debug { 
    position:fixed; 
    top:0; 
    left:0; 
    right:0; 
    z-index:999; 
    background:rgba(11,94,215,0.8); 
    color:#fff; 
    padding:8px; 
    font-size:13px; 
    font-family:monospace; 
    white-space:nowrap; 
    overflow:hidden; 
    text-overflow:ellipsis; 
}

/* Barra de progresso */
.progress-container { 
    position:fixed; 
    bottom:0; 
    left:0; 
    right:0; 
    height:28px; 
    background:#222; 
    z-index:100; 
}

.progress-bg { 
    position:absolute; 
    inset:0; 
    background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c); 
}

.progress-mask { 
    position:absolute; 
    inset:0; 
    background:#000; 
    width:100%; 
    will-change: width; /* ajuda performance em dispositivos antigos */
}

.scale { 
    position:absolute; 
    inset:0; 
    z-index:101; 
    color:white; 
    font-size:14px; 
    font-weight:bold; 
    text-shadow:0 0 3px #000; 
}

.scale span { 
    float:left; 
    width:20%; 
    text-align:center; 
    line-height:28px; 
}
</style>
</head>
<body onclick="skip()">

<div id="debug">Iniciando... (barra corrigida)</div>

<img id="mainImage" src="" alt="Dashboard">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
    <span>5m</span><span>4m</span><span>3m</span><span>2m</span><span>1m</span>
  </div>
</div>

<script>
// Configurações
const TEMPO_TROCA_MS = 5 * 60 * 1000;     // 5 minutos
const TEMPO_RELOAD_PAGINA = 4 * 3600 * 1000; // 4 horas para reset de memória

const repoUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
const manifestRaiz   = repoUrl + 'imagensPNG.txt';
const baseUrlRaiz    = repoUrl;
const manifestCarros = repoUrl + 'carros/imagens_carros.txt';
const baseUrlCarros  = repoUrl + 'carros/screenshots/';

let imagens = [];
let idx = 0;
let loadTimeout = null;
let autoTimeout = null;
let startTime = Date.now();

const debug = document.getElementById('debug');
const img = document.getElementById('mainImage');
const progressMask = document.getElementById('progressMask');

let imagensRaiz = [];
let imagensCarros = [];
let loaded = 0;

// Recarrega página para limpar memória após 4h
setTimeout(() => {
    debug.innerHTML = '4h atingidas → recarregando para limpar RAM...';
    setTimeout(() => location.reload(true), 2000);
}, TEMPO_RELOAD_PAGINA);

function log(msg) {
    const minutos = Math.round((Date.now() - startTime) / 60000);
    const total = imagens.length;
    const pos = total > 0 ? ` (${idx+1}/${total})` : '';
    debug.innerHTML = `${minutos}min | ${msg}${pos}`;
}

function resetProgress() {
    progressMask.style.transition = 'none';
    progressMask.style.width = '100%';
    progressMask.offsetHeight; // força reflow

    // Aplica animação com duração exata
    progressMask.style.transition = `width ${TEMPO_TROCA_MS}ms linear`;
    progressMask.style.width = '0%';
}

function onImageLoad() {
    clearTimeouts();
    resetProgress();
    log(`OK: ${imagens[idx].name}`);
    autoTimeout = setTimeout(proxima, TEMPO_TROCA_MS);
}

function onImageError() {
    clearTimeouts();
    log(`ERRO: ${imagens[idx].name}`);
    setTimeout(proxima, 8000);
}

function clearTimeouts() {
    if (loadTimeout) clearTimeout(loadTimeout);
    if (autoTimeout) clearTimeout(autoTimeout);
    loadTimeout = autoTimeout = null;
}

function mostrarImagem() {
    if (!imagens.length) return;
    
    img.src = ''; // limpa para forçar reload em alguns casos
    img.src = imagens[idx].urlBase;

    clearTimeouts();
    loadTimeout = setTimeout(() => {
        log(`TIMEOUT: ${imagens[idx].name}`);
        proxima();
    }, 20000);
}

function proxima() {
    idx = (idx + 1) % imagens.length;
    mostrarImagem();
}

function skip() {
    clearTimeouts();
    proxima();
}

function buildImagens() {
    let i = 0, j = 0;
    imagens = [];

    while (j < imagensRaiz.length) {
        const qtd = Math.min(3, imagensCarros.length - i);
        for (let k = 0; k < qtd; k++) {
            imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
            i++;
        }
        imagens.push({urlBase: baseUrlRaiz + imagensRaiz[j], name: imagensRaiz[j]});
        j++;
    }

    while (i < imagensCarros.length) {
        imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
        i++;
    }

    if (imagens.length) {
        log(`Lista OK: ${imagens.length} imagens (10 raiz + 30 carros)`);
        mostrarImagem();
    } else {
        log('Lista vazia!');
    }
}

function checkLoaded() {
    loaded++;
    if (loaded === 2) buildImagens();
}

function loadManifest(url, arr, tipo) {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 15000;
    xhr.onreadystatechange = () => {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                const linhas = (xhr.responseText || '').split('\n');
                for (let ln of linhas) {
                    ln = ln.trim();
                    if (ln && /\.png$/i.test(ln)) arr.push(ln);
                }
                log(`Manifest ${tipo}: ${arr.length} itens`);
                checkLoaded();
            } else {
                log(`Erro manifest ${tipo} (${xhr.status}) → retry 10s`);
                setTimeout(() => loadManifest(url, arr, tipo), 10000);
            }
        }
    };
    xhr.ontimeout = () => {
        log(`Timeout manifest ${tipo} → retry`);
        setTimeout(() => loadManifest(url, arr, tipo), 10000);
    };
    xhr.send();
}

loadManifest(manifestRaiz,   imagensRaiz,   'raiz');
loadManifest(manifestCarros, imagensCarros, 'carros');
</script>
</body>
</html>
