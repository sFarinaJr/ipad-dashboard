<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard Universal</title>
<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }

/* Imagem ocupa tela toda */
#mainImage { 
    width:100% !important; 
    height:100% !important; 
    display:block; 
    position: absolute;
    top: 0;
    left: 0;
}

#debug { 
    position:fixed; 
    top:0; 
    left:0; 
    right:0; 
    z-index:999; 
    background:#0b5ed7; 
    color:#fff; 
    padding: 6px 10px 6px 10ch;
    font-size:13px; 
    font-family:monospace; 
    white-space:nowrap; 
    overflow:hidden; 
    text-overflow:ellipsis; 
    opacity: 0.7; 
}

/* Barra de progressão */
.progress-container { 
    position:fixed; 
    bottom:0; 
    left:0; 
    right:0; 
    height:28px; 
    background:#222; 
    z-index:100; 
}

.progress-bg { 
    position:absolute; 
    top:0; 
    right:0; 
    bottom:0; 
    left:0; 
    background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c); 
}

.progress-mask { 
    position:absolute; 
    top:0; 
    bottom:0; 
    left:0; 
    background:#000; 
    width:100%; 
    -webkit-animation: shrink 300s linear forwards; 
    animation: shrink 300s linear forwards; 
    z-index:1; 
}

@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }

/* Escala de tempo */
.scale { 
    position:absolute; 
    top:0; 
    left:0; 
    width:100%; 
    height:28px; 
    z-index:101; 
    color:white; 
    font-size:14px; 
    font-weight:bold; 
    text-shadow:0 0 4px #000; 
}

.scale span { 
    display: block;
    float: left;
    width: 20%;
    text-align: center;
    line-height: 28px;
}
</style>
</head>
<body onclick="skip()">

<div id="debug">Iniciando...</div>
<img id="mainImage" src="" alt="Dashboard" onload="onImageLoad()" onerror="onImageError()">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
      <span>5m</span><span>4m</span><span>3m</span><span>2m</span><span>1m</span>
  </div>
</div>

<script>
var repoUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var imagens = [];
var idx = 0;
var tempoTroca = 5 * 60 * 1000; // 5 minutos
var loadTimeout = null;
var autoTimeout = null;

var debug = document.getElementById('debug');
var imgElement = document.getElementById('mainImage');
var progressMask = document.getElementById('progressMask');

var baseUrlRaiz = repoUrl;
var manifestRaiz = repoUrl + 'imagensPNG.txt';
var baseUrlCarros = repoUrl + 'carros/screenshots/';
var manifestCarros = repoUrl + 'carros/imagens_carros.txt';

var imagensRaiz = [];
var imagensCarros = [];
var loaded = 0;
var retryCounts = { raiz: 0, carros: 0 };
var maxRetries = 5; // Limite de tentativas para carregar manifests

function log(msg) {
    var total = imagens.length;
    var num = (idx + 1);
    var pos = total > 0 ? ' (' + num + '/' + total + ')' : '';
    debug.innerHTML = msg + pos;
}

function resetProgress() {
    progressMask.style.webkitAnimation = 'none';
    progressMask.style.animation = 'none';
    progressMask.offsetHeight; // força reflow
    progressMask.style.webkitAnimation = 'shrink 300s linear forwards';
    progressMask.style.animation = 'shrink 300s linear forwards';
}

function onImageLoad() {
    if (loadTimeout) {
        clearTimeout(loadTimeout);
        loadTimeout = null;
    }
    resetProgress();
    log(imagens[idx].name);
    if (autoTimeout) {
        clearTimeout(autoTimeout);
        autoTimeout = null;
    }
    autoTimeout = setTimeout(proxima, tempoTroca);
}

function onImageError() {
    if (loadTimeout) {
        clearTimeout(loadTimeout);
        loadTimeout = null;
    }
    log('ERRO: ' + imagens[idx].name);
    setTimeout(proxima, 5000);
}

function mostrarImagem() {
    if (imagens.length === 0) return;
    var obj = imagens[idx];
    
    // Removido cache busting para permitir cache e reduzir downloads repetidos
    imgElement.src = obj.urlBase; // Sem ?t=

    if (loadTimeout) {
        clearTimeout(loadTimeout);
        loadTimeout = null;
    }
    loadTimeout = setTimeout(function() {
        log('TIMEOUT: ' + imagens[idx].name);
        proxima();
    }, 30000);
}

function proxima() {
    if (imagens.length === 0) return;
    idx = (idx + 1) % imagens.length;
    mostrarImagem();
}

function skip() {
    if (autoTimeout) {
        clearTimeout(autoTimeout);
        autoTimeout = null;
    }
    proxima();
}

function buildImagens() {
    var i = 0;
    var j = 0;
    imagens = [];

    // Para cada uma das imagens da raiz, adicionamos 3 carros + 1 raiz
    while (j < imagensRaiz.length) {
        var qtdCarros = Math.min(3, imagensCarros.length - i);
        for (var k = 0; k < qtdCarros; k++) {
            imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
            i++;
        }

        imagens.push({urlBase: baseUrlRaiz + imagensRaiz[j], name: imagensRaiz[j]});
        j++;
    }

    // Se sobrar alguma imagem de carro
    while (i < imagensCarros.length) {
        imagens.push({urlBase: baseUrlCarros + imagensCarros[i], name: imagensCarros[i]});
        i++;
    }

    if (imagens.length > 0) {
        log('Lista mesclada carregada: ' + imagens.length + ' imagens (3 carros : 1 raiz)');
        mostrarImagem();
    } else {
        log('Erro: Lista vazia');
    }
}

function checkLoaded() {
    loaded++;
    if (loaded === 2) {
        buildImagens();
    }
}

function loadManifest(url, arrayToFill, isRaiz) {
    var type = isRaiz ? 'raiz' : 'carros';
    if (retryCounts[type] >= maxRetries) {
        log('Máximo de tentativas atingido para lista ' + type + '. Parando.');
        checkLoaded(); // Prosseguir mesmo sem essa lista
        return;
    }
    
    log('Carregando lista ' + type + '...');
    retryCounts[type]++;
    
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                var texto = xhr.responseText || '';
                var linhas = texto.split('\n');
                for (var i = 0; i < linhas.length; i++) {
                    var linha = linhas[i].trim();
                    if (linha && (linha.indexOf('.png') > -1 || linha.indexOf('.PNG') > -1)) {
                        arrayToFill.push(linha);
                    }
                }
                log('Lista ' + type + ' carregada: ' + arrayToFill.length + ' imagens');
                retryCounts[type] = 0; // Resetar contagem em sucesso
                checkLoaded();
            } else {
                log('Erro ao baixar lista ' + type + '. Status: ' + xhr.status + ' (Tentativa ' + retryCounts[type] + '/' + maxRetries + ')');
                setTimeout(function() { loadManifest(url, arrayToFill, isRaiz); }, 10000);
            }
        }
    };
    xhr.send();
}

loadManifest(manifestRaiz, imagensRaiz, true);
loadManifest(manifestCarros, imagensCarros, false);
</script>
</body>
</html>
