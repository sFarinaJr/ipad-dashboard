<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Dashboard</title>

<style>
* { margin:0; padding:0; border:0; }
html, body {
  height:100%; width:100%;
  background:#000; overflow:hidden;
  font-family:sans-serif;
}

#mainImage {
  width:100%; height:100%; display:block;
  object-fit:contain;
}

#debug {
  position:fixed;
  top:0; left:0; right:0;
  z-index:999;
  background:#0b5ed7;
  color:#fff;
  padding:6px 10px 6px 120px;
  font-size:13px;
  font-family:monospace;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.progress-container {
  position:fixed; bottom:0; left:0; right:0; height:28px;
  background:#222; z-index:100;
}
.progress-bg {
  position:absolute; top:0; right:0; bottom:0; left:0;
  background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c);
  background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c);
}
.progress-mask {
  position:absolute; top:0; bottom:0; left:0; background:#000;
  width:100%;
  -webkit-animation: shrink 300s linear infinite;
  animation: shrink 300s linear infinite;
  z-index:1;
}
@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }

.scale {
  position:absolute; top:0; right:0; bottom:0; left:0;
  display:-webkit-box; display:flex;
  -webkit-justify-content:space-between; justify-content:space-between;
  -webkit-align-items:center; align-items:center;
  color:white; font-size:14px; font-weight:bold;
  pointer-events:none; z-index:101;
  padding:0 8px; box-sizing:border-box;
  text-shadow:0 0 4px #000;
}
.scale span { -webkit-flex:1; flex:1; text-align:center; }
</style>
</head>
<body>

<div id="debug">Iniciando...</div>
<img id="mainImage" src="" alt="Dashboard">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask"></div>
  <div class="scale">
    <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
  </div>
</div>

<script>
var baseUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var imagens = [];
var idx = 0;
var tempoTroca = 5 * 60 * 1000;

var debug = document.getElementById('debug');
var imgElement = document.getElementById('mainImage');

var preloadImg = new Image();

function mostraDebug(msg){
  debug.innerHTML = msg;
}

function pad(n){
  if(n < 10) return '00' + n;
  if(n < 100) return '0' + n;
  return '' + n;
}

function montarLista(callback){
  imagens = [];
  var numero = 1;
  var falhasSeguidas = 0;
  var limiteFalhas = 40;

  mostraDebug('Buscando imagens screenshot-...');

  function testar(){
    var nome = 'screenshot-' + pad(numero) + '.png';
    var url = baseUrl + nome;

    var img = new Image();

    img.onload = function(){
      imagens.push(nome);
      falhasSeguidas = 0;
      numero++;
      testar();
    };

    img.onerror = function(){
      falhasSeguidas++;
      numero++;

      if(falhasSeguidas >= limiteFalhas){
        imagens.sort();
        idx = 0;
        mostraDebug('Total encontrado: ' + imagens.length);
        callback();
      }else{
        testar();
      }
    };

    img.src = url + '?t=' + new Date().getTime();
  }

  testar();
}

function preloadProxima(){
  var proximo = idx + 1;
  if(proximo >= imagens.length) return;

  preloadImg.src = baseUrl + imagens[proximo];
}

function mostrarImagem(){
  if(imagens.length === 0){
    mostraDebug('Nenhuma imagem encontrada');
    return;
  }

  var nome = imagens[idx];
  imgElement.src = baseUrl + nome;
  mostraDebug('Imagem ' + (idx+1) + '/' + imagens.length + ' - ' + nome);

  preloadProxima();
}

function proxima(){
  idx++;

  if(idx >= imagens.length){
    montarLista(function(){
      mostrarImagem();
    });
  }else{
    mostrarImagem();
  }
}

montarLista(function(){
  mostrarImagem();
  setInterval(proxima, tempoTroca);
});
</script>

</body>
</html>
