<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
    }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Área da barra + números */
    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;               /* altura para caber os números confortavelmente */
      background: rgba(40, 40, 50, 0.7);
      z-index: 100;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: #4a90e2;
      transform: scaleX(1);
      transform-origin: left;
      transition: transform linear 300s;
      will-change: transform;
    }

    .progress-bar.reset {
      transition: none;
      transform: scaleX(1);
    }

    /* Números sobrepostos na barra */
    .scale {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #000;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
      user-select: none;
      z-index: 101;
    }

    .scale span {
      flex: 1;
      text-align: center;
      text-shadow: 0 0 3px rgba(255,255,255,0.6); /* leve sombra branca para contraste */
    }

    /* Prompt de fullscreen */
    #fullscreen-prompt {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      color: #eee;
      font-size: min(9vw, 42px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: all;
      user-select: none;
    }

    @media (orientation: landscape) {
      #fullscreen-prompt {
        font-size: min(6vw, 36px);
      }
      .scale {
        font-size: 12px;
      }
    }
  </style>
</head>
<body ontouchstart="">

  <img id="screenshot" 
       src="https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/latest-screenshot.png" 
       alt="Dashboard">

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
    
    <div class="scale">
      <span>5</span>
      <span>4</span>
      <span>3</span>
      <span>2</span>
      <span>1</span>
    </div>
  </div>

  <div id="fullscreen-prompt" onclick="enterFullscreen(); this.style.display='none';">
    Toque na tela para ativar tela cheia
  </div>

  <script>
    const INTERVAL_MS = 5 * 60 * 1000; // 300000 ms
    const img = document.getElementById('screenshot');
    const progressBar = document.getElementById('progress');

    function updateImage() {
      const ts = Date.now();
      img.src = `https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/latest-screenshot.png?t=${ts}`;
      
      // Reset para 100%
      progressBar.classList.add('reset');
      progressBar.offsetWidth; // reflow forçado (importante no iOS antigo)
      progressBar.classList.remove('reset');
      
      // Inicia esvaziamento em 300 segundos
      progressBar.style.transition = 'transform linear 300s';
      progressBar.style.transform = 'scaleX(0)';
    }

    function enterFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
      }
    }

    // Inicialização
    updateImage();

    setInterval(updateImage, INTERVAL_MS);

    // Fullscreen na primeira interação
    document.addEventListener('touchend', () => {
      enterFullscreen();
    }, { once: true });

    // Mostra prompt se sair do fullscreen
    document.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitFullscreenElement) {
        document.getElementById('fullscreen-prompt').style.display = 'flex';
      }
    });
  </script>
</body>
</html>
