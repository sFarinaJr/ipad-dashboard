<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="300">

  <title>Dashboard</title>

  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height:100%; width:100%;
      background:#000; overflow:hidden;
      font-family:sans-serif; color:#0f0;
    }
    #mainImage {
      width:100%; height:100%; display:block;
      object-fit:contain;
    }
    #debug {
      position:fixed; bottom:36px; right:8px; z-index:999;
      background:rgba(0,0,0,0.7); padding:6px 10px;
      font-size:13px; font-family:monospace;
      max-width:80%; line-height:1.3;
      text-align:right;
    }
    .progress-container {
      position:fixed; bottom:0; left:0; right:0; height:28px;
      background:#222; z-index:100;
    }
    .progress-bg {
      position:absolute; top:0; right:0; bottom:0; left:0;
      background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c);
      background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c);
    }
    .progress-mask {
      position:absolute; top:0; bottom:0; left:0; background:#000;
      width:100%;
      -webkit-animation: shrink 300s linear infinite;
      animation: shrink 300s linear infinite;
      z-index:1;
    }
    @-webkit-keyframes shrink { from {width:100%} to {width:0%} }
    @keyframes shrink { from {width:100%} to {width:0%} }
    .scale {
      position:absolute; top:0; right:0; bottom:0; left:0;
      display:-webkit-box; display:flex;
      -webkit-justify-content:space-between; justify-content:space-between;
      -webkit-align-items:center; align-items:center;
      color:white; font-size:14px; font-weight:bold;
      pointer-events:none; user-select:none; z-index:101;
      padding:0 8px; box-sizing:border-box;
      text-shadow:0 0 4px #000;
    }
    .scale span { -webkit-flex:1; flex:1; text-align:center; }
    @media (orientation:landscape) {
      .scale { font-size:13px; }
      .progress-container { height:26px; }
      #debug { font-size:12px; bottom:34px; }
    }
  </style>
</head>
<body>

  <img id="mainImage" src="" alt="Dashboard">

  <div id="debug">Iniciando...</div>

  <div class="progress-container">
    <div class="progress-bg"></div>
    <div class="progress-mask"></div>
    <div class="scale">
      <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
    </div>
  </div>

  <script>
    var baseUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
    var imagens = [
      'latest-screenshot.png',
      'screenshot-003.png',
      'screenshot-004.png',
      'screenshot-005.png',
      'screenshot-006.png',
      'screenshot-007.png',
      'screenshot-008.png',
      'screenshot-009.png',
      'screenshot-010.png',
      'screenshot-011.png',
      'screenshot-012.png'
    ];
    var idx = 0;
    var tempoTroca = 5 * 60 * 1000;       // 5 minutos
    var tempoAtualizaLista = 50 * 60 * 1000; // 50 minutos

    var debug = document.getElementById('debug');
    var imgElement = document.getElementById('mainImage');

    function mostraDebug(msg) {
      debug.innerHTML = msg;
    }

    function mostraProxima() {
      if (imagens.length === 0) {
        mostraDebug('Nenhuma imagem na lista');
        return;
      }

      var nome = imagens[idx];
      var url = baseUrl + nome;

      mostraDebug('Mostrando:<br>' + nome + '<br>(' + (idx+1) + '/' + imagens.length + ')');

      var tester = new Image();
      tester.onload = function() {
        imgElement.src = url;
        idx = (idx + 1) % imagens.length;
      };
      tester.onerror = function() {
        mostraDebug('Falhou:<br>' + nome + '<br>→ pulando');
        idx = (idx + 1) % imagens.length;
        setTimeout(mostraProxima, 800); // tenta próxima rápido
      };
      tester.src = url;
    }

    function atualizarListaImagens() {
      mostraDebug('Atualizando lista<br>(a cada 50 min)...');

      var xhr = new XMLHttpRequest();
      xhr.open('GET', baseUrl + 'index.html?t=' + new Date().getTime(), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            var html = xhr.responseText;
            var novasImagens = [];
            var re = /(latest-screenshot\.png|screenshot-\d{3}\.png)/gi;
            var match;
            while ((match = re.exec(html)) !== null) {
              var nome = match[1].toLowerCase();
              if (novasImagens.indexOf(nome) === -1) {
                novasImagens.push(nome);
              }
            }

            if (novasImagens.length > 0) {
              imagens = novasImagens.sort();
              mostraDebug('Lista atualizada!<br>' + imagens.length + ' imagens');
            } else {
              mostraDebug('Nenhuma imagem encontrada');
            }
          } else {
            mostraDebug('Falha atualização<br>status ' + xhr.status);
          }
        }
      };
      xhr.send();
    }

    // Início
    mostraProxima();

    // Troca de imagem normal
    setInterval(mostraProxima, tempoTroca);

    // Atualiza lista de imagens raramente
    setInterval(atualizarListaImagens, tempoAtualizaLista);

    // Primeira checagem um pouco mais cedo
    setTimeout(atualizarListaImagens, 3 * 60 * 1000);

  </script>

</body>
</html>
