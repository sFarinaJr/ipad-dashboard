<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Dashboard</title>

<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }
#mainImage { width:100%; height:100%; display:block; }
#debug { position:fixed; top:0; left:0; right:0; z-index:999; background:#0b5ed7; color:#fff; padding:6px 10px 6px 120px; font-size:13px; font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.progress-container { position:fixed; bottom:0; left:0; right:0; height:28px; background:#222; z-index:100; }
.progress-bg { position:absolute; top:0; right:0; bottom:0; left:0; background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c); background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c); }
.progress-mask { position:absolute; top:0; bottom:0; left:0; background:#000; width:100%; -webkit-animation: shrink 300s linear infinite; animation: shrink 300s linear infinite; z-index:1; }
@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }
.scale { position:absolute; top:0; right:0; bottom:0; left:0; display:-webkit-box; display:flex; -webkit-justify-content:space-between; justify-content:space-between; -webkit-align-items:center; align-items:center; color:white; font-size:14px; font-weight:bold; pointer-events:none; z-index:101; padding:0 8px; box-sizing:border-box; text-shadow:0 0 4px #000; }
.scale span { -webkit-flex:1; flex:1; text-align:center; }
</style>
</head>
<body>

<div id="debug">Iniciando...</div>
<img id="mainImage" src="" alt="Dashboard" onload="onImageLoad()" onerror="onImageError()">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask"></div>
  <div class="scale"><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span></div>
</div>

<script>
var baseUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var imagens = [];
var idx = 0;
var tempoTroca = 5 * 60 * 1000; // 5 min
var loadTimeout = null;
var isTest = true;
var testImage = 'https://upload.wikimedia.org/wikipedia/commons/4/47/PNG_transparency_demonstration_1.png'; // Imagem de teste simples e pública

var debug = document.getElementById('debug');
var imgElement = document.getElementById('mainImage');

function log(msg) {
  var agora = new Date().toLocaleTimeString('pt-BR');
  debug.innerHTML = msg;
}

function onImageLoad() {
  if (loadTimeout) clearTimeout(loadTimeout);
  if (isTest) {
    log('SUCESSO: Imagem de teste carregou! Prosseguindo com dashboard...');
    isTest = false;
    loadImagens();
  } else {
    log('' + imagens[idx]);
    // Reinicia timeout para próxima troca automática
  }
}

function onImageError() {
  if (loadTimeout) clearTimeout(loadTimeout);
  if (isTest) {
    log('ERRO: Falha na imagem de teste. Problema geral com imagens?');
  } else {
    log('ERRO: Falha ao carregar ' + imagens[idx] + ' → pulando');
    proxima();
  }
}

function mostrarImagem() {
  if (imagens.length === 0) {
    log('Nenhuma imagem na lista');
    return;
  }
  var nome = imagens[idx];
  if (!nome) {
    proxima();
    return;
  }
  log('Tentando (' + (idx + 1) + '/' + imagens.length + '): ' + nome);
  imgElement.src = ''; // limpa
  imgElement.src = baseUrl + nome;

  if (loadTimeout) clearTimeout(loadTimeout);
  loadTimeout = setTimeout(function() {
    log('TIMEOUT 30s para ' + nome + ' → pulando');
    proxima();
  }, 30000);
}

function proxima() {
  idx = (idx + 1) % imagens.length;
  mostrarImagem();
}

function loadImagens() {
  log('Buscando imagensPNG.txt...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', baseUrl + 'imagensPNG.txt', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        var texto = xhr.responseText || '';
        var linhas = texto.split('\n');
        imagens = [];
        for (var i = 0; i < linhas.length; i++) {
          var linha = linhas[i].trim();
          if (linha && linha.indexOf('.png') > -1) {
            imagens.push(linha);
          }
        }
        if (imagens.length > 0) {
          log('OK: ' + imagens.length + ' imagens. Iniciando dashboard...');
          mostrarImagem();
          setInterval(proxima, tempoTroca);
        } else {
          log('Nenhum .png no TXT');
        }
      } else {
        log('Erro TXT status ' + xhr.status + ' → retry 10s');
        setTimeout(loadImagens, 10000);
      }
    }
  };
  xhr.onerror = function() {
    log('Falha rede TXT → retry 10s');
    setTimeout(loadImagens, 10000);
  };
  xhr.send();
}

// Início: Testa imagem pública primeiro
log('Testando carga de imagem pública...');
imgElement.src = testImage;
loadTimeout = setTimeout(function() {
  log('TIMEOUT 30s para teste → falha geral?');
}, 30000);
</script>
</body>
</html>
