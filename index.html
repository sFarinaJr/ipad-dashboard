<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="300"> <!-- backup: recarrega a cada 5 min -->

  <title>Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }

    #mainImage {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain; /* evita distorção em telas antigas */
    }

    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: #222;
      z-index: 100;
    }

    .progress-bg {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c);
      background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c);
    }

    .progress-mask {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      background: #000;
      width: 100%;
      -webkit-animation: shrinkLeftToRight 300s linear forwards infinite;
      animation: shrinkLeftToRight 300s linear forwards infinite;
      z-index: 1;
    }

    @-webkit-keyframes shrinkLeftToRight {
      from { width: 100%; }
      to   { width: 0%; }
    }

    @keyframes shrinkLeftToRight {
      from { width: 100%; }
      to   { width: 0%; }
    }

    .scale {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: -webkit-box;
      display: -moz-box;
      display: -ms-flexbox;
      display: -webkit-flex;
      display: flex;
      -webkit-justify-content: space-between;
      -moz-justify-content: space-between;
      -ms-justify-content: space-between;
      justify-content: space-between;
      -webkit-align-items: center;
      -moz-align-items: center;
      -ms-align-items: center;
      align-items: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
      pointer-events: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      z-index: 101;
      padding: 0 8px;
      -webkit-box-sizing: border-box;
      -moz-box-sizing: border-box;
      box-sizing: border-box;
      text-shadow: 0 0 4px black, 1px 1px 2px black;
    }

    .scale span {
      -webkit-flex: 1;
      -moz-flex: 1;
      -ms-flex: 1;
      flex: 1;
      text-align: center;
    }

    @media (orientation: landscape) {
      .scale { font-size: 13px; }
      .progress-container { height: 26px; }
    }
  </style>
</head>
<body>

  <img id="mainImage" src="" alt="Dashboard">

  <div class="progress-container">
    <div class="progress-bg"></div>
    <div class="progress-mask"></div>
    <div class="scale">
      <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
    </div>
  </div>

  <script>
    // Configurações
    var totalImagens = 10;
    var tempoTroca   = 5 * 60 * 1000; // 5 minutos em milissegundos

    // Começa do número 1
    var indiceAtual = 1;

    function formatarNumero(n) {
      return (n < 10 ? '0' : '') + n;
    }

    function getProximaImagem() {
      var tentativas = 0;
      while (tentativas < totalImagens) {
        var num = formatarNumero(indiceAtual);
        var url = "screenshot-" + num + ".png";
        
        // Testa se a imagem existe (método compatível com iOS 9)
        var imgTeste = new Image();
        imgTeste.onload = function() {
          // Imagem existe → usa ela
          document.getElementById("mainImage").src = url;
          // Avança para próxima (para a próxima chamada)
          indiceAtual++;
          if (indiceAtual > totalImagens) indiceAtual = 1;
        };
        imgTeste.onerror = function() {
          // Imagem não existe → tenta a próxima
          indiceAtual++;
          if (indiceAtual > totalImagens) indiceAtual = 1;
          getProximaImagem(); // tenta novamente
        };
        imgTeste.src = url; // dispara a verificação

        // Para evitar loop infinito no mesmo tick
        return;
      }
    }

    // Inicia a primeira imagem
    getProximaImagem();

    // Troca automaticamente a cada 5 minutos
    setInterval(function() {
      getProximaImagem();
    }, tempoTroca);

  </script>

</body>
</html>
