<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Dashboard</title>

<style>
* { margin:0; padding:0; border:0; }
html, body {
  height:100%; width:100%;
  background:#000; overflow:hidden;
  font-family:sans-serif;
}

#mainImage {
  width:100%; height:100%; display:block;
  object-fit:contain;
}

#debug {
  position:fixed;
  top:0; left:0; right:0;
  z-index:999;
  background:#0b5ed7;
  color:#fff;
  padding:6px 10px 6px 120px;
  font-size:13px;
  font-family:monospace;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.progress-container {
  position:fixed; bottom:0; left:0; right:0; height:28px;
  background:#222; z-index:100;
}
.progress-bg {
  position:absolute; top:0; right:0; bottom:0; left:0;
  background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c);
  background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c);
}
.progress-mask {
  position:absolute; top:0; bottom:0; left:0; background:#000;
  width:100%;
  -webkit-animation: shrink 300s linear infinite;
  animation: shrink 300s linear infinite;
  z-index:1;
}
@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }

.scale {
  position:absolute; top:0; right:0; bottom:0; left:0;
  display:-webkit-box; display:flex;
  -webkit-justify-content:space-between; justify-content:space-between;
  -webkit-align-items:center; align-items:center;
  color:white; font-size:14px; font-weight:bold;
  pointer-events:none; z-index:101;
  padding:0 8px; box-sizing:border-box;
  text-shadow:0 0 4px #000;
}
.scale span { -webkit-flex:1; flex:1; text-align:center; }
</style>
</head>
<body>

<div id="debug">Iniciando...</div>
<img id="mainImage" src="" alt="Dashboard">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask"></div>
  <div class="scale">
    <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
  </div>
</div>

<script>
var baseUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var imagens = [
  'screenshot_09_20260213_144245.png',
  'screenshot_08_20260213_143737.png',
  'screenshot_07_20260213_133014.png',
  'screenshot_06_20260213_132908.png',
  'screenshot_05_20260213_132405.png',
  'screenshot_04_20260213_140502.png',
  'screenshot_03_20260213_140003.png',
  'screenshot_02_20260213_135502.png',
  'screenshot_01_20260213_135002.png',
  'screenshot_00_20260213_134503.png'
  // Se adicionar mais no futuro, basta colar novas linhas aqui
];

var idx = 0;
var tempoTroca = 5 * 60 * 1000; // 5 minutos

var debug = document.getElementById('debug');
var imgElement = document.getElementById('mainImage');

function mostraDebug(msg) {
  debug.innerHTML = msg;
}

function preloadTodas() {
  for (var i = 0; i < imagens.length; i++) {
    var img = new Image();
    img.src = baseUrl + imagens[i];
  }
  mostraDebug('Pré-carregadas ' + imagens.length + ' imagens. Iniciando slideshow...');
}

function mostrarImagem() {
  if (imagens.length === 0) {
    mostraDebug('Nenhuma imagem na lista');
    return;
  }

  var nome = imagens[idx];
  imgElement.src = baseUrl + nome;
  mostraDebug('Imagem ' + (idx + 1) + '/' + imagens.length + ' → ' + nome);
}

function proxima() {
  idx = (idx + 1) % imagens.length;  // loop infinito: volta ao início automaticamente
  mostrarImagem();
}

// Início
if (imagens.length > 0) {
  // imagens já estão na ordem desejada (mais recente primeiro)
  // Se quiser ordem alfabética: imagens.sort();
  preloadTodas();
  mostrarImagem();
  setInterval(proxima, tempoTroca);
} else {
  mostraDebug('Lista de imagens vazia. Verifique o array imagens[]');
}
</script>

</body>
</html>
