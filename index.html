<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Dashboard</title>

<style>
* { margin:0; padding:0; border:0; }
html, body {
  height:100%; width:100%;
  background:#000; overflow:hidden;
  font-family:sans-serif;
}

#mainImage {
  width:100%; height:100%; display:block;
  object-fit:contain;
}

#debug {
  position:fixed;
  top:0; left:0; right:0;
  z-index:999;
  background:#0b5ed7;
  color:#fff;
  padding:6px 10px 6px 120px;
  font-size:13px;
  font-family:monospace;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.progress-container {
  position:fixed; bottom:0; left:0; right:0; height:28px;
  background:#222; z-index:100;
}
.progress-bg {
  position:absolute; top:0; right:0; bottom:0; left:0;
  background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c);
  background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c);
}
.progress-mask {
  position:absolute; top:0; bottom:0; left:0; background:#000;
  width:100%;
  -webkit-animation: shrink 300s linear infinite;
  animation: shrink 300s linear infinite;
  z-index:1;
}
@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }

.scale {
  position:absolute; top:0; right:0; bottom:0; left:0;
  display:-webkit-box; display:flex;
  -webkit-justify-content:space-between; justify-content:space-between;
  -webkit-align-items:center; align-items:center;
  color:white; font-size:14px; font-weight:bold;
  pointer-events:none; z-index:101;
  padding:0 8px; box-sizing:border-box;
  text-shadow:0 0 4px #000;
}
.scale span { -webkit-flex:1; flex:1; text-align:center; }
</style>
</head>
<body>

<div id="debug">Iniciando...</div>
<img id="mainImage" src="" alt="Dashboard" onerror="this.src=''; proxima();">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask"></div>
  <div class="scale">
    <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
  </div>
</div>

<script>
var baseUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var imagens = [];
var idx = 0;
var tempoTroca = 5 * 60 * 1000; // 5 minutos

var debug = document.getElementById('debug');
var imgElement = document.getElementById('mainImage');

function mostraDebug(msg) {
  debug.innerHTML = msg;
}

function mostrarImagem() {
  if (imagens.length === 0) {
    mostraDebug('Nenhuma imagem na lista (TXT vazio ou inválido)');
    return;
  }

  var nome = imagens[idx];
  if (!nome) {
    proxima();
    return;
  }

  imgElement.src = baseUrl + nome;
  mostraDebug('Tentando ' + (idx + 1) + ' de ' + imagens.length + ' → ' + nome);
}

function proxima() {
  idx = (idx + 1) % imagens.length;
  mostrarImagem();
}

function loadImagens() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', baseUrl + 'imagensPNG.txt', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        var texto = xhr.responseText || '';
        var linhas = texto.split('\n');
        imagens = [];

        for (var i = 0; i < linhas.length; i++) {
          var linha = linhas[i].trim();
          if (linha && linha.indexOf('.png') !== -1) {  // aceita só linhas com .png
            imagens.push(linha);
          }
        }

        if (imagens.length > 0) {
          mostraDebug('Carregou ' + imagens.length + ' imagens do TXT. Iniciando...');
          mostrarImagem();
          setInterval(proxima, tempoTroca);
        } else {
          mostraDebug('Nenhuma imagem válida encontrada no TXT');
        }
      } else {
        mostraDebug('Erro ao carregar TXT (status: ' + xhr.status + '). Tentando novamente em 5s...');
        setTimeout(loadImagens, 5000);
      }
    }
  };
  xhr.onerror = function() {
    mostraDebug('Falha na rede ao buscar TXT. Tentando novamente em 5s...');
    setTimeout(loadImagens, 5000);
  };
  xhr.send();
}

// Início
mostraDebug('Buscando imagensPNG.txt...');
loadImagens();
</script>

</body>
</html>
