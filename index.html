<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Recarrega a página automaticamente a cada 300 segundos (5 minutos) -->
  <meta http-equiv="refresh" content="300">
  
  <title>Dashboard</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
    }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    
    /* Barra de progresso fixa na parte inferior */
    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: rgba(40, 40, 50, 0.7);
      z-index: 100;
    }
    
    .progress-bar {
      height: 100%;
      background: #4a90e2;
      width: 100%;
      /* Animação com prefixo -webkit- para compatibilidade iOS 9 */
      -webkit-animation: drain 300s linear infinite;
      animation: drain 300s linear infinite;
    }
    
    @-webkit-keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }
    
    @keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }
    
    /* Números sobrepostos na barra */
    .scale {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #000;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
      user-select: none;
      z-index: 101;
    }
    
    .scale span {
      flex: 1;
      text-align: center;
      text-shadow: 0 0 3px rgba(255,255,255,0.6);
    }
    
    @media (orientation: landscape) {
      .scale {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/latest-screenshot.png"
       alt="Dashboard">
  
  <div class="progress-container">
    <div class="progress-bar"></div>
    <div class="scale">
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
      <span>5</span>
    </div>
  </div>
</body>
</html>
