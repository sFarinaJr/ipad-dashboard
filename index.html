<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
    }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Barra de progresso inferior */
    .progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: rgba(40, 40, 50, 0.7);
      z-index: 100;
    }
    .progress-bar {
      height: 100%;
      width: 100%;
      background: #4a90e2;
      transform: scaleX(1);
      transform-origin: left;
      transition: transform linear 300s;   /* 300 segundos = 5 minutos */
      will-change: transform;
    }
    .progress-bar.reset {
      transition: none;                    /* remove transição durante reset */
      transform: scaleX(1);
    }

    /* Prompt de fullscreen */
    #fullscreen-prompt {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      color: #eee;
      font-size: min(9vw, 42px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: all;
      user-select: none;
    }

    @media (orientation: landscape) {
      #fullscreen-prompt {
        font-size: min(6vw, 36px);
      }
    }
  </style>
</head>
<body ontouchstart="">

  <img id="screenshot" 
       src="https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/latest-screenshot.png" 
       alt="Dashboard">

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div id="fullscreen-prompt" onclick="enterFullscreen(); this.style.display='none';">
    Toque na tela para ativar tela cheia
  </div>

  <script>
    const INTERVAL_MS = 5 * 60 * 1000; // 300000 ms
    const img = document.getElementById('screenshot');
    const progressBar = document.getElementById('progress');

    function updateImage() {
      const ts = Date.now();
      img.src = `https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/latest-screenshot.png?t=${ts}`;
      
      // Reset da barra: força volta a 100% instantaneamente
      progressBar.classList.add('reset');
      progressBar.offsetWidth; // força reflow
      progressBar.classList.remove('reset');
      
      // Agora aplica a transição de 300s para esvaziar
      progressBar.style.transition = 'transform linear 300s';
      progressBar.style.transform = 'scaleX(0)';
    }

    function enterFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
      }
    }

    // ─── Inicialização ────────────────────────────────────────
    // Carrega primeira imagem e inicia barra cheia → esvaziando em 5 min
    updateImage();

    // Atualiza a cada 5 minutos exatos
    setInterval(updateImage, INTERVAL_MS);

    // Tenta fullscreen na primeira interação real
    document.addEventListener('touchend', () => {
      enterFullscreen();
    }, { once: true });

    // Mostra prompt novamente se sair do fullscreen
    document.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitFullscreenElement) {
        document.getElementById('fullscreen-prompt').style.display = 'flex';
      }
    });
  </script>
</body>
</html>
