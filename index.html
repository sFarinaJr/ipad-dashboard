<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="300"> <!-- recarrega a cada 5 min como backup -->

  <title>Dashboard</title>

  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height:100%; width:100%;
      background:#000; overflow:hidden;
      font-family:sans-serif; color:#0f0;
    }
    #mainImage {
      width:100%; height:100%; display:block;
      object-fit:contain;
    }
    #debug {
      position:fixed; top:8px; left:8px; z-index:999;
      background:rgba(0,0,0,0.7); padding:6px 10px;
      font-size:15px; font-family:monospace;
      max-width:90%;
    }
    .progress-container {
      position:fixed; bottom:0; left:0; right:0; height:28px;
      background:#222; z-index:100;
    }
    .progress-bg {
      position:absolute; top:0; right:0; bottom:0; left:0;
      background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c);
      background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c);
    }
    .progress-mask {
      position:absolute; top:0; bottom:0; left:0; background:#000;
      width:100%;
      -webkit-animation: shrink 300s linear infinite;
      animation: shrink 300s linear infinite;
      z-index:1;
    }
    @-webkit-keyframes shrink { from {width:100%} to {width:0%} }
    @keyframes shrink { from {width:100%} to {width:0%} }
    .scale {
      position:absolute; top:0; right:0; bottom:0; left:0;
      display:-webkit-box; display:flex;
      -webkit-justify-content:space-between; justify-content:space-between;
      -webkit-align-items:center; align-items:center;
      color:white; font-size:14px; font-weight:bold;
      pointer-events:none; user-select:none; z-index:101;
      padding:0 8px; box-sizing:border-box;
      text-shadow:0 0 4px #000;
    }
    .scale span { -webkit-flex:1; flex:1; text-align:center; }
    @media (orientation:landscape) {
      .scale { font-size:13px; }
      .progress-container { height:26px; }
    }
  </style>
</head>
<body>

  <img id="mainImage" src="" alt="Dashboard">

  <div id="debug">Iniciando...</div>

  <div class="progress-container">
    <div class="progress-bg"></div>
    <div class="progress-mask"></div>
    <div class="scale">
      <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
    </div>
  </div>

  <script>
    var base = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
    var imagens = [
      'latest-screenshot.png',
      'screenshot-003.png',
      'screenshot-004.png',
      'screenshot-005.png',
      'screenshot-006.png',
      'screenshot-007.png',
      'screenshot-008.png',
      'screenshot-009.png',
      'screenshot-010.png',
      'screenshot-011.png',
      'screenshot-012.png'
    ];
    var idx = 0;
    var tempo = 5 * 60 * 1000; // 5 minutos

    function mostraProxima() {
      var url = base + imagens[idx];
      var debug = document.getElementById('debug');
      var img = document.getElementById('mainImage');

      debug.innerHTML = 'Tentando: ' + imagens[idx];

      var tester = new Image();
      tester.onload = function() {
        img.src = url;
        debug.innerHTML = 'Mostrando: ' + imagens[idx];
        idx = (idx + 1) % imagens.length;
      };
      tester.onerror = function() {
        debug.innerHTML = 'Não encontrado: ' + imagens[idx] + ' → pulando';
        idx = (idx + 1) % imagens.length;
        setTimeout(mostraProxima, 400); // tenta próxima rápido
      };
      tester.src = url;
    }

    // Começa agora
    mostraProxima();

    // Troca automática a cada 5 minutos
    setInterval(mostraProxima, tempo);
  </script>

</body>
</html>
