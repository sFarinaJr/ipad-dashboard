<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="300">

  <title>Dashboard</title>

  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height:100%; width:100%;
      background:#000; overflow:hidden;
      font-family:sans-serif;
    }

    #mainImage {
      width:100%; height:100%; display:block;
      object-fit:contain;
    }

    /* DEBUG - deslocado para direita */
    #debug {
      position:fixed;
      top:0;
      left:120px;
      right:0;
      z-index:999;
      background:#0b5ed7;
      color:#fff;
      padding:6px 10px;
      font-size:13px;
      font-family:monospace;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .progress-container {
      position:fixed; bottom:0; left:0; right:0; height:28px;
      background:#222; z-index:100;
    }
    .progress-bg {
      position:absolute; top:0; right:0; bottom:0; left:0;
      background: -webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c);
      background: linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c);
    }
    .progress-mask {
      position:absolute; top:0; bottom:0; left:0; background:#000;
      width:100%;
      -webkit-animation: shrink 300s linear infinite;
      animation: shrink 300s linear infinite;
      z-index:1;
    }
    @-webkit-keyframes shrink { from {width:100%} to {width:0%} }
    @keyframes shrink { from {width:100%} to {width:0%} }

    .scale {
      position:absolute; top:0; right:0; bottom:0; left:0;
      display:-webkit-box; display:flex;
      -webkit-justify-content:space-between; justify-content:space-between;
      -webkit-align-items:center; align-items:center;
      color:white; font-size:14px; font-weight:bold;
      pointer-events:none; z-index:101;
      padding:0 8px; box-sizing:border-box;
      text-shadow:0 0 4px #000;
    }
    .scale span { -webkit-flex:1; flex:1; text-align:center; }
  </style>
</head>
<body>

<div id="debug">Iniciando...</div>

<img id="mainImage" src="" alt="Dashboard">

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask"></div>
  <div class="scale">
    <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
  </div>
</div>

<script>
var baseUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var imagens = [];
var idx = 0;

var tempoTroca = 5 * 60 * 1000;
var tempoAtualizaLista = 50 * 60 * 1000;

var debug = document.getElementById('debug');
var imgElement = document.getElementById('mainImage');

function mostraDebug(msg) {
  debug.innerHTML = msg;
}

function mostraProxima() {
  if (imagens.length === 0) {
    mostraDebug('Aguardando lista de imagens...');
    return;
  }

  var nome = imagens[idx];
  var url = baseUrl + nome;

  mostraDebug('Imagem: ' + nome + ' (' + (idx+1) + '/' + imagens.length + ')');

  var tester = new Image();
  tester.onload = function() {
    imgElement.src = url;
    idx = (idx + 1) % imagens.length;
  };
  tester.onerror = function() {
    idx = (idx + 1) % imagens.length;
    setTimeout(mostraProxima, 800);
  };
  tester.src = url;
}

function atualizarListaImagens() {
  mostraDebug('Buscando imagens...');

  var xhr = new XMLHttpRequest();
  xhr.open('GET', baseUrl + 'index.html?t=' + new Date().getTime(), true);

  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {

      var html = xhr.responseText;
      var novas = [];
      var re = /href="([^"]+\.png)"/gi;
      var match;

      while ((match = re.exec(html)) !== null) {
        var nome = match[1].toLowerCase();
        if (novas.indexOf(nome) === -1) {
          novas.push(nome);
        }
      }

      if (novas.length > 0) {
        imagens = novas.sort();
        idx = 0;
        mostraDebug('Encontradas ' + imagens.length + ' imagens');
        mostraProxima();
      } else {
        mostraDebug('Tentando novamente...');
        setTimeout(atualizarListaImagens, 30000);
      }
    }
  };

  xhr.send();
}

atualizarListaImagens();
setInterval(mostraProxima, tempoTroca);
setInterval(atualizarListaImagens, tempoAtualizaLista);
</script>

</body>
</html>
