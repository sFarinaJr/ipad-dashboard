<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard TikTok - Mesclado</title>
<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }
#embedContainer { width:100% !important; height:100% !important; display:block; position:absolute; top:0; left:0; overflow:hidden; }
#embedContainer .tiktok-embed { max-width:none !important; width:100% !important; height:100% !important; min-width:0 !important; }
#debug { position:fixed; top:0; left:0; right:0; z-index:999; background:#0b5ed7; color:#fff; padding:6px 10px 6px 10ch; font-size:13px; font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0.85; }
.progress-container { position:fixed; bottom:0; left:0; right:0; height:28px; background:#222; z-index:100; }
.progress-bg { position:absolute; top:0; right:0; bottom:0; left:0; background:-webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c); }
.progress-mask { position:absolute; top:0; bottom:0; left:0; background:#000; width:100%; z-index:1; }
.scale { position:absolute; top:0; left:0; width:100%; height:28px; z-index:101; color:white; font-size:14px; font-weight:bold; text-shadow:0 0 4px #000; }
.scale span { display:block; float:left; width:20%; text-align:center; line-height:28px; }
@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }
</style>
</head>
<body onclick="skip()">

<div id="debug">Obtendo hora da internet...</div>
<div id="embedContainer"></div>

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
      <span>60s</span><span>45s</span><span>30s</span><span>15s</span><span>0s</span>
  </div>
</div>

<script>
// =============================================
// Variáveis e hora da internet
// =============================================
var repoUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var apiBase = 'https://tiktok-api23.p.rapidapi.com/api/';
var apiKey = '2569e9676fmsh923c6c67ec6e126p1114fdjsnc8b1616d48b5'; // Sua key do RapidAPI
var apiHost = 'tiktok-api23.p.rapidapi.com';
var usernamesCarros = ['supercarblondie', 'shmee150', 'username_af', 'georgejsaliba', 'jdm_toaster']; // Perfis de carros; adicione mais
var fallbackVideoUrl = 'https://www.tiktok.com/@exemplo/video/1234567890123456789';

var imagens = [];
var idx = 0;
var loadTimeout = null;
var autoTimeout = null;
var serverOffset = 0;

var debug = document.getElementById('debug');
var embedContainer = document.getElementById('embedContainer');
var progressMask = document.getElementById('progressMask');

var manifestRaiz = repoUrl + 'videos_raiz.txt'; // Crie esse txt com URLs de vídeos fixos (um por linha)
var baseUrlRaiz = ''; // Não precisa de base, URLs completas

var imagensRaiz = [];
var imagensCarros = [];

// Hora REAL da internet
function getServerMs() {
  return Date.now() + serverOffset;
}

// =============================================
// Sincroniza hora da internet
// =============================================
function syncServerTime(callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('HEAD', apiBase + 'user/detail?v=' + Date.now(), true); // Usa API para header Date
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      var dateHeader = xhr.getResponseHeader('Date');
      if (dateHeader) {
        serverOffset = new Date(dateHeader).getTime() - Date.now();
        debug.innerHTML = 'Hora internet OK';
      } else {
        debug.innerHTML = 'Sem header → relógio local';
      }
      callback();
    }
  };
  xhr.onerror = function() { callback(); };
  xhr.send();
}

// =============================================
// Tempo do slot (1 min = 60000ms; ajuste para 300000 se quiser 5 min)
// =============================================
function getCurrentSlotStartMs() {
  var ms = getServerMs();
  var d = new Date(ms);
  var sec = d.getSeconds();
  var min = d.getMinutes();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), d.getHours(), min, 0, 0).getTime();
}

function msToNextSlot() {
  var now = getServerMs();
  var current = getCurrentSlotStartMs();
  var next = current + 60000;
  var diff = next - now;
  if (diff <= 0) diff += 60000;
  return diff;
}

// =============================================
// BARRA DE PROGRESSO
// =============================================
function resetProgress() {
  var remainingSec = Math.ceil((getCurrentSlotStartMs() + 60000 - getServerMs()) / 1000);
  if (remainingSec < 10) remainingSec = 60;

  progressMask.style.webkitAnimation = 'none';
  progressMask.style.animation = 'none';
  progressMask.style.width = '100%';
  progressMask.offsetHeight; // força reflow

  progressMask.style.webkitAnimation = 'shrink ' + remainingSec + 's linear forwards';
  progressMask.style.animation = 'shrink ' + remainingSec + 's linear forwards';
}

// =============================================
// Fetch secUid from username
// =============================================
function fetchSecUid(username, callback) {
  log('Buscando secUid para @' + username + '...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', apiBase + 'user/detail?uniqueId=' + username, true);
  xhr.setRequestHeader('X-RapidAPI-Key', apiKey);
  xhr.setRequestHeader('X-RapidAPI-Host', apiHost);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      var response = JSON.parse(xhr.responseText);
      var secUid = response.data.user.sec_uid || ''; // Ajuste se o path for diferente (ex: data.user.secUid)
      if (secUid) {
        log('secUid obtido: ' + secUid);
        callback(secUid);
      } else {
        log('Sem secUid - Usando fallback');
        callback('');
      }
    } else if (xhr.readyState === 4) {
      log('Erro secUid: ' + xhr.status + ' - Usando fallback');
      callback('');
    }
  };
  xhr.send();
}

// =============================================
// Fetch 30 vídeos de carros via API
// =============================================
function fetchVideosCarros(callback) {
  var username = usernamesCarros[0]; // Usa o primeiro; ou random: usernamesCarros[Math.floor(Math.random() * usernamesCarros.length)]
  fetchSecUid(username, function(secUid) {
    if (!secUid) {
      imagensCarros = [{urlBase: fallbackVideoUrl, name: 'fallback'}]; // Fallback se falhar
      return callback();
    }
    log('Buscando 30 vídeos de @' + username + '...');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', apiBase + 'user/posts?secUid=' + secUid + '&count=30', true);
    xhr.setRequestHeader('X-RapidAPI-Key', apiKey);
    xhr.setRequestHeader('X-RapidAPI-Host', apiHost);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        var response = JSON.parse(xhr.responseText);
        var awemeList = response.data.aweme_list || []; // Ajuste se path diferente (ex: data.videos)
        awemeList.forEach(function(video) {
          var uniqueId = video.author.unique_id || username;
          var awemeId = video.aweme_id || video.id;
          var videoUrl = 'https://www.tiktok.com/@' + uniqueId + '/video/' + awemeId;
          imagensCarros.push({urlBase: videoUrl, name: awemeId});
        });
        log('Carros: ' + imagensCarros.length + ' vídeos');
        callback();
      } else if (xhr.readyState === 4) {
        log('Erro posts: ' + xhr.status + ' - Usando fallback');
        imagensCarros = [{urlBase: fallbackVideoUrl, name: 'fallback'}];
        callback();
      }
    };
    xhr.send();
  });
}

// =============================================
// Slideshow
// =============================================
function mostrarImagem() {
  if (imagens.length === 0) return;
  resetProgress();
  var videoUrl = imagens[idx].urlBase;
  var videoId = imagens[idx].name;
  var embedHtml = '<blockquote class="tiktok-embed" cite="' + videoUrl + '" data-video-id="' + videoId + '" style="max-width:none; width:100%; height:100%; min-width:325px;"><section></section></blockquote>';
  embedContainer.innerHTML = embedHtml;
  if (!document.getElementById('tiktokScript')) {
    var script = document.createElement('script');
    script.id = 'tiktokScript';
    script.async = true;
    script.src = 'https://www.tiktok.com/embed.js';
    document.body.appendChild(script);
  }
  log(imagens[idx].name);
  scheduleNextAdvance();
}

function log(msg) {
  var total = imagens.length;
  var pos = total > 0 ? ' (' + (idx+1) + '/' + total + ')' : '';
  debug.innerHTML = msg + pos;
}

function nextImage() {
  idx = (idx + 1) % imagens.length;
  try { localStorage.setItem('lastIdx', idx); } catch(e){}
  mostrarImagem();
}

function skip() {
  if (autoTimeout) clearTimeout(autoTimeout);
  nextImage();
}

function scheduleNextAdvance() {
  if (autoTimeout) clearTimeout(autoTimeout);
  autoTimeout = setTimeout(nextImage, msToNextSlot());
}

// =============================================
// Build + espera inicial
// =============================================
function buildImagens() {
  var i = 0, j = 0;
  imagens = [];

  while (j < imagensRaiz.length) {
    var qtd = Math.min(3, imagensCarros.length - i);
    for (var k = 0; k < qtd; k++) {
      imagens.push(imagensCarros[i]);
      i++;
    }
    imagens.push(imagensRaiz[j]);
    j++;
  }
  while (i < imagensCarros.length) {
    imagens.push(imagensCarros[i]);
    i++;
  }

  if (imagens.length === 0) {
    log('Nenhuma imagem');
    return;
  }

  log('Carregadas ' + imagens.length + ' itens');

  var delay = msToNextSlot();
  if (delay > 6000) {
    var sec = Math.ceil(delay / 1000);
    debug.innerHTML = 'Aguardando próximo slot (' + sec + 's)';
    setTimeout(startSlideshow, delay);
  } else {
    startSlideshow();
  }
}

function startSlideshow() {
  var saved = null;
  try { saved = localStorage.getItem('lastIdx'); } catch(e){}
  if (saved !== null) {
    idx = parseInt(saved, 10) % imagens.length;
  } else {
    idx = Math.floor(getServerMs() / 60000) % imagens.length;
  }
  try { localStorage.setItem('lastIdx', idx); } catch(e){}
  mostrarImagem();
}

function parseManifest(text) {
  var arr = [];
  var lines = text.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var ln = lines[i].trim();
    if (ln && ln.indexOf('tiktok.com') !== -1) {
      var parts = ln.match(/video\/(\d+)/);
      var videoId = parts ? parts[1] : 'unknown';
      arr.push({urlBase: ln, name: videoId});
    }
  }
  return arr;
}

function loadManifestRaiz() {
  log('Baixando lista raiz...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', manifestRaiz + '?v=' + Date.now(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      imagensRaiz = parseManifest(xhr.responseText);
      log('Raiz: ' + imagensRaiz.length);
      fetchVideosCarros(buildImagens);
    } else if (xhr.readyState === 4) {
      log('Erro raiz: ' + xhr.status);
      setTimeout(loadManifestRaiz, 15000);
    }
  };
  xhr.send();
}

// =============================================
// Início
// =============================================
syncServerTime(function() {
  loadManifestRaiz();
});
</script>
</body>
</html>
