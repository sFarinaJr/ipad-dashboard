<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dashboard Teste - Fallback</title>
<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }
#embedContainer { width:100%; height:100%; position:absolute; top:0; left:0; overflow:hidden; }
#debug { position:fixed; top:0; left:0; right:0; z-index:999; background:#0b5ed7; color:#fff; padding:6px; font-size:13px; font-family:monospace; opacity:0.85; }
.progress-container { position:fixed; bottom:0; left:0; right:0; height:28px; background:#222; z-index:100; }
.progress-bg { position:absolute; inset:0; background:linear-gradient(to right, #4a90e2, #f39c12 60%, #e74c3c); }
.progress-mask { position:absolute; inset:0 0 0 0; background:#000; width:100%; z-index:1; transition:width 0.3s; }
.scale { position:absolute; inset:0; color:white; font-weight:bold; text-shadow:0 0 4px #000; }
.scale span { float:left; width:20%; text-align:center; line-height:28px; }
@keyframes shrink { from {width:100%} to {width:0%} }
</style>
</head>
<body onclick="skip()">

<div id="debug">Inicializando...</div>
<div id="embedContainer"></div>

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
    <span>5m</span><span>4m</span><span>3m</span><span>2m</span><span>1m</span>
  </div>
</div>

<script>
const itens = [
  {url: 'https://www.tiktok.com/@supercarblondie/video/7219450454705573162', name: 'fallback1', isVideo: true},
  {url: 'https://www.tiktok.com/@shmee150/video/7123456789012345678', name: 'fallback2', isVideo: true},
  // Adicione aqui os 2 itens do seu videos_raiz.txt
  {url: 'https://www.tiktok.com/@supercarblondie/video/7219450454705573162', name: 'raiz1', isVideo: true},
  {url: 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/screenshot001.png', name: 'raiz2', isVideo: false}
];

let idx = 0;
let autoTimeout = null;

function resetProgress() {
  const mask = document.getElementById('progressMask');
  mask.style.animation = 'none';
  mask.style.width = '100%';
  void mask.offsetWidth; // reflow
  mask.style.animation = 'shrink 300s linear forwards';
}

function mostrar() {
  resetProgress();
  const item = itens[idx];
  const container = document.getElementById('embedContainer');
  let html = '';
  if (item.isVideo) {
    html = `<blockquote class="tiktok-embed" cite="${item.url}" data-video-id="${item.name}" style="width:100%;height:100%"><section></section></blockquote>`;
  } else {
    html = `<img src="${item.url}" style="width:100%;height:100%;object-fit:contain;">`;
  }
  container.innerHTML = html;
  document.getElementById('debug').innerHTML = `${item.name} (${idx+1}/${itens.length})`;
  if (!document.getElementById('tiktokScript') && item.isVideo) {
    const s = document.createElement('script');
    s.id = 'tiktokScript';
    s.async = true;
    s.src = 'https://www.tiktok.com/embed.js';
    document.body.appendChild(s);
  }
  schedule();
}

function schedule() {
  if (autoTimeout) clearTimeout(autoTimeout);
  autoTimeout = setTimeout(next, 300000); // 5 minutos
}

function next() {
  idx = (idx + 1) % itens.length;
  mostrar();
}

function skip() {
  if (autoTimeout) clearTimeout(autoTimeout);
  next();
}

mostrar();
</script>
</body>
</html>
