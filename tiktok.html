<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard TikTok - Mesclado Carros</title>
<style>
* { margin:0; padding:0; border:0; }
html, body { height:100%; width:100%; background:#000; overflow:hidden; font-family:sans-serif; }
#embedContainer { width:100% !important; height:100% !important; display:block; position:absolute; top:0; left:0; overflow:hidden; }
#embedContainer .tiktok-embed { max-width:none !important; width:100% !important; height:100% !important; min-width:0 !important; }
#debug { position:fixed; top:0; left:0; right:0; z-index:999; background:#0b5ed7; color:#fff; padding:6px 10px 6px 10ch; font-size:13px; font-family:monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0.85; }
.progress-container { position:fixed; bottom:0; left:0; right:0; height:28px; background:#222; z-index:100; }
.progress-bg { position:absolute; top:0; right:0; bottom:0; left:0; background:-webkit-linear-gradient(left, #4a90e2, #f39c12 60%, #e74c3c); }
.progress-mask { position:absolute; top:0; bottom:0; left:0; background:#000; width:100%; z-index:1; }
.scale { position:absolute; top:0; left:0; width:100%; height:28px; z-index:101; color:white; font-size:14px; font-weight:bold; text-shadow:0 0 4px #000; }
.scale span { display:block; float:left; width:20%; text-align:center; line-height:28px; }
@-webkit-keyframes shrink { from {width:100%} to {width:0%} }
@keyframes shrink { from {width:100%} to {width:0%} }
</style>
</head>
<body onclick="skip()">

<div id="debug">Obtendo hora da internet...</div>
<div id="embedContainer"></div>

<div class="progress-container">
  <div class="progress-bg"></div>
  <div class="progress-mask" id="progressMask"></div>
  <div class="scale">
      <span>60s</span><span>45s</span><span>30s</span><span>15s</span><span>0s</span>
  </div>
</div>

<script>
// =============================================
// Variáveis
// =============================================
var repoUrl = 'https://raw.githubusercontent.com/sfarinajr/ipad-dashboard/main/';
var apiBase = 'https://tiktok-api23.p.rapidapi.com/api/';
var apiKey = '2569e9676fmsh923c6c67ec6e126p1114fdjsnc8b1616d48b5';
var apiHost = 'tiktok-api23.p.rapidapi.com';

var usernamesCarros = ['supercarblondie', 'shmee150', 'dougdemuro', 'carwow', 'supercar-driver']; // Perfis de carros; adicione mais

var fallbackVideoUrls = [
  'https://www.tiktok.com/@supercarblondie/video/1234567890123456789', // substitua por reais se quiser
  'https://www.tiktok.com/@shmee150/video/9876543210987654321'
];

var imagens = [];
var idx = 0;
var autoTimeout = null;
var serverOffset = 0;

var debug = document.getElementById('debug');
var embedContainer = document.getElementById('embedContainer');
var progressMask = document.getElementById('progressMask');

var manifestRaiz = repoUrl + 'videos_raiz.txt'; // txt com URLs completas de vídeos TikTok fixos (um por linha)
var imagensRaiz = [];
var imagensCarros = [];

// Hora server
function getServerMs() { return Date.now() + serverOffset; }

// Sync hora
function syncServerTime(callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('HEAD', apiBase + 'user/detail?v=' + Date.now(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      var dateHeader = xhr.getResponseHeader('Date');
      if (dateHeader) {
        serverOffset = new Date(dateHeader).getTime() - Date.now();
        debug.innerHTML = 'Hora OK';
      } else {
        debug.innerHTML = 'Hora local';
      }
      callback();
    }
  };
  xhr.onerror = function() { callback(); };
  xhr.send();
}

// Slot 1 min
function getCurrentSlotStartMs() {
  var ms = getServerMs();
  var d = new Date(ms);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), d.getHours(), d.getMinutes(), 0, 0).getTime();
}

function msToNextSlot() {
  var now = getServerMs();
  var current = getCurrentSlotStartMs();
  var next = current + 60000;
  var diff = next - now;
  if (diff <= 0) diff += 60000;
  return diff;
}

// Progresso
function resetProgress() {
  var remainingSec = Math.ceil((getCurrentSlotStartMs() + 60000 - getServerMs()) / 1000);
  if (remainingSec < 10) remainingSec = 60;
  progressMask.style.webkitAnimation = 'none';
  progressMask.style.animation = 'none';
  progressMask.style.width = '100%';
  progressMask.offsetHeight;
  progressMask.style.webkitAnimation = 'shrink ' + remainingSec + 's linear forwards';
  progressMask.style.animation = 'shrink ' + remainingSec + 's linear forwards';
}

// Fetch secUid
function fetchSecUid(username, callback) {
  log('secUid @' + username);
  var xhr = new XMLHttpRequest();
  xhr.open('GET', apiBase + 'user/detail?uniqueId=' + username, true);
  xhr.setRequestHeader('X-RapidAPI-Key', apiKey);
  xhr.setRequestHeader('X-RapidAPI-Host', apiHost);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      var response = JSON.parse(xhr.responseText);
      var secUid = response.data?.user?.sec_uid || response.user?.secUid || '';
      callback(secUid);
    } else if (xhr.readyState === 4) {
      log('Erro secUid ' + xhr.status);
      callback('');
    }
  };
  xhr.send();
}

// Fetch vídeos de usuário (tente /post/user ou fallback para search)
function fetchVideosCarros(callback) {
  var username = usernamesCarros[0]; // ou random: usernamesCarros[Math.floor(Math.random()*usernamesCarros.length)]
  fetchSecUid(username, function(secUid) {
    if (!secUid) {
      log('Sem secUid - fallback search');
      fetchFallbackSearch(callback);
      return;
    }
    log('Posts @' + username);
    var xhr = new XMLHttpRequest();
    xhr.open('GET', apiBase + 'post/user?secUid=' + secUid + '&count=30', true); // tente isso primeiro
    // Alternativas se 404: mude para 'aweme/post' ou 'user/aweme'
    // xhr.open('GET', apiBase + 'aweme/post?secUid=' + secUid + '&count=30', true);
    xhr.setRequestHeader('X-RapidAPI-Key', apiKey);
    xhr.setRequestHeader('X-RapidAPI-Host', apiHost);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        var response = JSON.parse(xhr.responseText);
        var list = response.data?.aweme_list || response.aweme_list || response.data?.videos || [];
        list.forEach(function(video) {
          var uid = video.author?.unique_id || username;
          var vid = video.aweme_id || video.id || '';
          if (vid) {
            var url = 'https://www.tiktok.com/@' + uid + '/video/' + vid;
            imagensCarros.push({urlBase: url, name: vid});
          }
        });
        log('Carros: ' + imagensCarros.length);
        if (imagensCarros.length === 0) fetchFallbackSearch(callback);
        else callback();
      } else if (xhr.readyState === 4) {
        log('Erro posts ' + xhr.status + ' - tentando search');
        fetchFallbackSearch(callback);
      }
    };
    xhr.send();
  });
}

// Fallback: busca temática
function fetchFallbackSearch(callback) {
  log('Buscando "supercar"');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', apiBase + 'search/posts?query=supercar OR jdm OR carros&count=30', true);
  xhr.setRequestHeader('X-RapidAPI-Key', apiKey);
  xhr.setRequestHeader('X-RapidAPI-Host', apiHost);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      var response = JSON.parse(xhr.responseText);
      var list = response.data || response.aweme_list || [];
      list.forEach(function(post) {
        var uid = post.author?.unique_id || 'unknown';
        var vid = post.aweme_id || post.id;
        if (vid) {
          var url = 'https://www.tiktok.com/@' + uid + '/video/' + vid;
          imagensCarros.push({urlBase: url, name: vid});
        }
      });
      log('Fallback: ' + imagensCarros.length);
    }
    if (imagensCarros.length === 0) {
      fallbackVideoUrls.forEach(function(u) {
        var id = u.match(/video\/(\d+)/)?.[1] || 'fallback';
        imagensCarros.push({urlBase: u, name: id});
      });
    }
    callback();
  };
  xhr.send();
}

// Mostrar vídeo
function mostrarImagem() {
  if (imagens.length === 0) return;
  resetProgress();
  var url = imagens[idx].urlBase;
  var id = imagens[idx].name;
  var html = '<blockquote class="tiktok-embed" cite="' + url + '" data-video-id="' + id + '" style="width:100%;height:100%;"><section></section></blockquote>';
  embedContainer.innerHTML = html;
  if (!document.getElementById('tiktokScript')) {
    var s = document.createElement('script');
    s.id = 'tiktokScript';
    s.async = true;
    s.src = 'https://www.tiktok.com/embed.js';
    document.body.appendChild(s);
  }
  log(imagens[idx].name + ' (' + (idx+1) + '/' + imagens.length + ')');
  scheduleNextAdvance();
}

function log(msg) { debug.innerHTML = msg; }

function nextImage() {
  idx = (idx + 1) % imagens.length;
  try { localStorage.setItem('lastIdx', idx); } catch(e) {}
  mostrarImagem();
}

function skip() {
  if (autoTimeout) clearTimeout(autoTimeout);
  nextImage();
}

function scheduleNextAdvance() {
  if (autoTimeout) clearTimeout(autoTimeout);
  autoTimeout = setTimeout(nextImage, msToNextSlot());
}

// Build array intercalado
function buildImagens() {
  var i = 0, j = 0;
  imagens = [];
  while (j < imagensRaiz.length) {
    var qtd = Math.min(3, imagensCarros.length - i);
    for (var k = 0; k < qtd; k++) {
      imagens.push(imagensCarros[i++]);
    }
    imagens.push(imagensRaiz[j++]);
  }
  while (i < imagensCarros.length) imagens.push(imagensCarros[i++]);
  log('Total: ' + imagens.length);
  var delay = msToNextSlot();
  if (delay > 6000) setTimeout(startSlideshow, delay);
  else startSlideshow();
}

function startSlideshow() {
  var saved = localStorage.getItem('lastIdx');
  idx = saved ? parseInt(saved) % imagens.length : Math.floor(getServerMs() / 60000) % imagens.length;
  localStorage.setItem('lastIdx', idx);
  mostrarImagem();
}

function parseManifest(text) {
  var arr = [];
  text.split('\n').forEach(function(ln) {
    ln = ln.trim();
    if (ln && ln.includes('tiktok.com')) {
      var id = ln.match(/video\/(\d+)/)?.[1] || 'raiz';
      arr.push({urlBase: ln, name: id});
    }
  });
  return arr;
}

function loadManifestRaiz() {
  log('Raiz...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', manifestRaiz + '?v=' + Date.now(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      imagensRaiz = parseManifest(xhr.responseText);
      log('Raiz: ' + imagensRaiz.length);
      fetchVideosCarros(buildImagens);
    } else if (xhr.readyState === 4) {
      log('Erro raiz ' + xhr.status);
      setTimeout(loadManifestRaiz, 15000);
    }
  };
  xhr.send();
}

// Início
syncServerTime(function() {
  loadManifestRaiz();
});
</script>
</body>
</html>
